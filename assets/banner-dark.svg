<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" role="img" aria-label="JOAKIM N. LARSSEN, security researcher who ships products">
  <rect width="900" height="280" fill="#0D1011"/>

  <!-- faint dotted grid motif, top-right field -->
  <g fill="#22282B">
    <circle cx="612" cy="40" r="1.4"/><circle cx="644" cy="40" r="1.4"/><circle cx="676" cy="40" r="1.4"/><circle cx="708" cy="40" r="1.4"/><circle cx="740" cy="40" r="1.4"/><circle cx="772" cy="40" r="1.4"/><circle cx="804" cy="40" r="1.4"/><circle cx="836" cy="40" r="1.4"/>
    <circle cx="612" cy="64" r="1.4"/><circle cx="644" cy="64" r="1.4"/><circle cx="676" cy="64" r="1.4"/><circle cx="708" cy="64" r="1.4"/><circle cx="740" cy="64" r="1.4"/><circle cx="772" cy="64" r="1.4"/><circle cx="804" cy="64" r="1.4"/><circle cx="836" cy="64" r="1.4"/>
    <circle cx="612" cy="88" r="1.4"/><circle cx="644" cy="88" r="1.4"/><circle cx="676" cy="88" r="1.4"/><circle cx="708" cy="88" r="1.4"/><circle cx="740" cy="88" r="1.4"/><circle cx="772" cy="88" r="1.4"/><circle cx="804" cy="88" r="1.4"/><circle cx="836" cy="88" r="1.4"/>
  </g>
  <!-- a few cells lit teal in the field, like an active node cluster -->
  <g fill="#3C8C84">
    <circle cx="708" cy="64" r="1.6"/><circle cx="740" cy="64" r="1.6"/><circle cx="772" cy="40" r="1.6"/>
  </g>
  <circle cx="740" cy="64" r="3.2" fill="none" stroke="#5ED3C4" stroke-width="1"/>

  <!-- hex initials: 0x4A 0x4E 0x4C = J N L (ASCII) -->
  <text x="860" y="44" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#3C8C84" text-anchor="end">0x4A</text>
  <text x="860" y="68" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#3C8C84" text-anchor="end">0x4E</text>
  <text x="860" y="92" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#3C8C84" text-anchor="end">0x4C</text>

  <!-- top rule + prompt path / locality -->
  <rect x="40" y="52" width="540" height="1" fill="#22282B"/>
  <text x="40" y="44" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#3C8C84">~/joakimlarssen</text>
  <text x="580" y="44" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#828B8F" text-anchor="end">oslo, no</text>

  <!-- left accent bar -->
  <rect x="40" y="92" width="3" height="86" fill="#5ED3C4"/>

  <!-- wordmark -->
  <text x="60" y="138" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="48" font-weight="700" letter-spacing="2" fill="#E6E7E8">JOAKIM<tspan fill="#5ED3C4"> N. </tspan>LARSSEN</text>

  <!-- tagline with trailing block cursor -->
  <text x="62" y="172" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" letter-spacing="0.5" fill="#828B8F">security researcher who ships products<tspan fill="#5ED3C4" font-weight="700"> &#9608;</tspan></text>

  <!-- scanline / role strip -->
  <rect x="40" y="206" width="820" height="1" fill="#22282B"/>
  <g font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12" letter-spacing="1.5">
    <text x="40" y="232" fill="#5ED3C4">$ whoami</text>
    <text x="160" y="232" fill="#828B8F">red + blue</text>
    <text x="264" y="232" fill="#3C8C84">&#183;</text>
    <text x="284" y="232" fill="#828B8F">purple-team</text>
    <text x="404" y="232" fill="#3C8C84">&#183;</text>
    <text x="424" y="232" fill="#828B8F">ctf</text>
    <text x="468" y="232" fill="#3C8C84">&#183;</text>
    <text x="488" y="232" fill="#828B8F">ai agents</text>
  </g>

  <!-- thin scanline detail near bottom -->
  <g fill="#14181A">
    <rect x="40" y="252" width="820" height="2"/>
    <rect x="40" y="258" width="820" height="2"/>
  </g>
  <rect x="40" y="252" width="120" height="2" fill="#3C8C84"/>
</svg>
