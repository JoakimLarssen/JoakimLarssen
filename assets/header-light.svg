<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="JOAKIM N. LARSSEN, security researcher who ships products">
  <rect width="900" height="220" fill="#F4F6F6"/>
  <!-- thin top rule -->
  <rect x="40" y="44" width="820" height="1" fill="#D2D8D9"/>

  <!-- terminal prompt mark -->
  <text x="40" y="36" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#2C6B64">~/joakimlarssen</text>
  <text x="828" y="36" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#5A6468" text-anchor="end">oslo &#183; bergen, no</text>

  <!-- wordmark -->
  <text x="40" y="118" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="46" font-weight="700" letter-spacing="2" fill="#14181A">JOAKIM<tspan fill="#1E7A70"> N. </tspan>LARSSEN</text>

  <!-- tagline, with a trailing block cursor drawn as a tspan so it follows
       the end of the text regardless of which monospace font renders, instead
       of a rect at a hardcoded x that drifts with the fallback font -->
  <text x="42" y="158" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" letter-spacing="0.5" fill="#5A6468">security researcher who ships products<tspan fill="#1E7A70" font-weight="700"> &#9608;</tspan></text>

  <!-- bottom rule -->
  <rect x="40" y="186" width="820" height="1" fill="#D2D8D9"/>
  <text x="40" y="206" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12" letter-spacing="1" fill="#2C6B64">$ whoami</text>
</svg>
