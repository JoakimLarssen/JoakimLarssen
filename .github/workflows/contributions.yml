name: contributions widget

on:
  schedule:
    # twice a day (00:17 and 12:17 UTC); avoids the top-of-hour rush
    - cron: "17 0,12 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/render-contributions.mjs"
      - ".github/workflows/contributions.yml"

permissions:
  contents: write

concurrency:
  group: contributions-widget
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Render contributions SVG
        env:
          # Prefers a classic PAT (scope read:user) stored as GH_TOKEN so that
          # private contribution counts are included. Falls back to the
          # default GITHUB_TOKEN, which may omit private counts. See SETUP.md.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/render-contributions.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain assets/contributions-2mo.svg)" ]]; then
            git add assets/contributions-2mo.svg
            git commit -m "chore: refresh contributions widget [skip ci]"
            # Push with a rebase-and-retry so a scheduled run colliding with a
            # manual dispatch (or the other workflow) cannot lose the refresh
            # to a non-fast-forward rejection.
            for attempt in 1 2 3; do
              if git push; then
                break
              fi
              echo "Push rejected (attempt $attempt); rebasing on origin/main and retrying."
              git pull --rebase --autostash origin main
            done
          else
            echo "No change to contributions widget."
          fi
